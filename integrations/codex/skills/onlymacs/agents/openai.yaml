version: 1
display_name: OnlyMacs
short_description: Runs branded OnlyMacs commands or natural-language swarm asks through the installed OnlyMacs shell launcher.
default_prompt: Use the onlymacs skill to route this request through the branded OnlyMacs command surface, preferring the installed shell launcher at $HOME/.local/bin/onlymacs-shell, then $HOME/.local/bin/onlymacs, and falling back to the onlymacs command when it is already on PATH. Preserve --extended, --plan-then-execute, --overnight, --plan/--plan:FILE, and resume-run when supplied. For normal prompt-only work, prefer the best-available swarm path so capable remote Macs can help without hard-excluding This Mac unless the user clearly asks for remote-first. For generated scripts, files, documents, or app artifacts, prefer --extended --context-write inbox. After generated work completes, read onlymacs/inbox/latest.json plus the referenced status/result/plan files, summarize provider/model/status/step completion/percent/resume point/token estimates/paths/next step, and lightly sanity-check the saved artifact without integrating it unless asked.
